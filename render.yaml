# Render Blueprint for the Nexis backend web service.
# It does not deploy by itself; Render uses it when you create/deploy a service.
services:
  - type: web
    name: nexis-ai-search
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: OPENAI_TIMEOUT_MS
        value: "25000"
      - key: OPENAI_API_KEY
        sync: false
      - key: ALLOWED_ORIGIN
        sync: false
      - key: FIREBASE_API_KEY
        sync: false
      - key: FIREBASE_AUTH_DOMAIN
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_MESSAGING_SENDER_ID
        sync: false
      - key: FIREBASE_APP_ID
        sync: false
      - key: FIREBASE_MEASUREMENT_ID
        sync: false
